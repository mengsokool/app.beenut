# Debos Recipe for BeeNut OS (Generic ARM64 / aarch64 SBC or Computer)
# Builds a bootable live Debian image for general ARM64 single board computers and UEFI ARM machines.
architecture: arm64

actions:
  # 1. Bootstrap Debian Bookworm base system for ARM64
  - action: debootstrap
    suite: bookworm
    mirror: http://deb.debian.org/debian
    components:
      - main
      - contrib
      - non-free
      - non-free-firmware

  # 2. Install essential system management utilities
  - action: apt
    packages:
      - systemd-sysv
      - udev
      - kmod
      - dbus
      - policykit-1
      - sudo
      - zstd
      - plymouth
      - plymouth-themes

  # 3. Install ARM64 generic Linux kernel and standard firmware drivers
  - action: apt
    packages:
      - linux-image-arm64
      - firmware-linux
      - firmware-linux-nonfree

  # 4. Install dependencies for UI and GStreamer pipeline
  - action: apt
    packages:
      - libc6
      - libstdc++6
      - libqt6core6
      - libqt6network6
      - gstreamer1.0-tools
      - gstreamer1.0-plugins-base
      - gstreamer1.0-plugins-good
      - gstreamer1.0-plugins-bad
      - gstreamer1.0-gl
      - libegl1
      - libgl1
      - libgtk-3-0
      - grub-efi-arm64-bin

  # 5. Copy custom overlays (motd, issue, systemd configuration)
  - action: overlay
    source: overlays

  # 6. Install target BeeNut package inside rootfs
  - action: overlay
    source: deb
    destination: /opt/beenut-packages

  - action: run
    chroot: true
    script: install-deb.sh

  # 7. Configure services & systemd auto-login loop
  - action: run
    chroot: true
    script: enable-appliance-services.sh

  # 8. Setup GRUB Bootloader for UEFI ARM64 compatibility
  - action: run
    chroot: true
    script: configure-grub-silent.sh

  # 9. Configure UEFI partition layout for raw disk image
  - action: image-partition
    imagename: {{.IMAGE_NAME}}
    imagesize: 3GB
    partitiontype: gpt
    mountpoints:
      - mountpoint: /
        partition: root
      - mountpoint: /boot/efi
        partition: ESP
    partitions:
      - name: ESP
        fs: vfat
        start: 0%
        end: 256MB
      - name: root
        fs: ext4
        start: 256MB
        end: 100%

  # 10. Copy configured root filesystem into the disk image
  - action: filesystem-deploy

  # 11. Install UEFI GRUB on disk image boot partition
  - action: run
    chroot: true
    script: install-grub-arm64.sh
