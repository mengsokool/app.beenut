name: Bug report
description: Report a reproducible problem in BeeNut.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve BeeNut. Please include logs or screenshots when they help explain the issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: BeeNut failed to...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Install...
        2. Start...
        3. See...
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Raspberry Pi OS / ARM64
        - Debian or Ubuntu / AMD64
        - macOS
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: BeeNut version
      placeholder: v0.2.0 or commit SHA
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant logs from the app, `journalctl`, or diagnostics bundle.
      render: shell

